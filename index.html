<!DOCTYPE html>
<html lang="ru">
<head>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; overflow-x: hidden; }
        .glass { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .orange-glow:hover { border-color: rgba(230, 126, 34, 0.5); box-shadow: 0 0 30px rgba(230, 126, 34, 0.2); transform: scale(1.02); }
        .transition-custom { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Компактный компонент иконок
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const paths = {

                shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",

                zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
                check: "M20 6L9 17l-5-5",
                arrow: "M5 12h14M12 5l7 7-7 7"
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name] || ""} />
                </svg>
            );
        };

        const App = () => {
            return (
                <div className="w-full">
                    {/* Слайд 1 */}
                    <section className="h-screen flex flex-col items-center justify-center text-center px-6 bg-[radial-gradient(circle_at_center,rgba(230,126,34,0.1)_0%,transparent_70%)]">
                        <div className="glass px-4 py-2 rounded-full mb-8 text-xs font-bold tracking-widest text-white/60 uppercase">
                           YouTube Production 2026
                        </div>
                        <h1 className="text-5xl md:text-8xl font-black italic uppercase tracking-tighter leading-none mb-6">
                            Создаю <span className="text-[#E67E22]">трафик</span>, <br />который покупает
                        </h1>
                        <p className="text-xl md:text-2xl text-white/40 max-w-2xl mb-12 font-light">
                            Превращаем ваш YouTube в системный источник теплых лидов для бизнеса.
                        </p>
                        <a href="https://t.me/polyasmedia" target="_blank" className="bg-[#E67E22] text-white px-12 py-6 rounded-3xl font-black text-2xl hover:scale-110 shadow-[0_0_50px_rgba(230,126,34,0.4)] transition-custom uppercase italic tracking-tighter">
                            Обсудить проект
                        </a>
                    </section>

                    {/* Слайд 2: Почему YouTube */}
                    <section className="py-24 px-6 max-w-6xl mx-auto">
                        <div className="grid md:grid-cols-3 gap-8">
                            <div className="glass p-10 rounded-[3rem] orange-glow transition-custom">
                                <Icon name="users" className="w-12 h-12 text-[#E67E22] mb-6" />
                                <h3 className="text-4xl font-black mb-2 tracking-tighter">22 млн+</h3>
                                <p className="text-white/40">Человек в РФ ежедневно ищут ответы на YouTube. Это ваши клиенты.</p>
                            </div>
                            <div className="glass p-10 rounded-[3rem] orange-glow transition-custom">
                                <Icon name="shield" className="w-12 h-12 text-[#E67E22] mb-6" />
                                <h3 className="text-4xl font-black mb-2 tracking-tighter italic">Доверие</h3>
                                <p className="text-white/40">Клиент видит эксперта и покупает еще до первого звонка.</p>
                            </div>
                            <div className="glass p-10 rounded-[3rem] orange-glow transition-custom">
                                <Icon name="trend" className="w-12 h-12 text-[#E67E22] mb-6" />
                                <h3 className="text-4xl font-black mb-2 tracking-tighter">Актив</h3>
                                <p className="text-white/40">Видео работает на вас годами, в отличие от платного трафика.</p>
                            </div>
                        </div>
                    </section>

                    {/* Слайд 3: Кейсы */}
                    <section className="py-24 px-6 max-w-6xl mx-auto">
                        <h2 className="text-5xl font-black uppercase italic mb-16 tracking-tighter">Твердые кейсы</h2>
                        <div className="grid md:grid-cols-2 gap-10">
                            {[
                                { name: "Get ASIC", niche: "Майнинг", img: "photo_1_2026-04-20_22-09-41.jpg", res: "2000 лидов / мес" },
                                { name: "SER CRYPTO", niche: "Инвестиции", img: "photo_3_2026-04-20_22-09-41.jpg", res: "1000+ лидов / мес" },
                                { name: "NTS AUTO", niche: "Автотовары", img: "photo_2_2026-04-20_22-09-41.jpg", res: "х5 рост продаж" },
                                { name: "Lavanta Ride", niche: "Турция", img: "photo_4_2026-04-20_22-09-41.jpg", res: "200 скутеров / мес" }
                            ].map((k, i) => (
                                <div key={i} className="glass rounded-[3rem] overflow-hidden orange-glow transition-custom">
                                    <div className="h-60 bg-[#111] relative">
                                        <img src={k.img} className="w-full h-full object-cover opacity-80" alt={k.name} />
                                        <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] to-transparent"></div>
                                    </div>
                                    <div className="p-8">
                                        <h4 className="text-2xl font-black uppercase italic">{k.name}</h4>
                                        <p className="text-[#E67E22] font-bold text-xs uppercase mb-4 tracking-widest">{k.niche}</p>
                                        <p className="text-xl font-medium tracking-tight">? {k.res}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Слайд 4: Прайс */}
                    <section className="py-24 px-6 max-w-6xl mx-auto">
                        <h2 className="text-5xl font-black uppercase text-center mb-16 tracking-tighter">Инвестиции</h2>
                        <div className="grid lg:grid-cols-3 gap-8">
                            {/* Minimum */}
                            <div className="glass p-10 rounded-[3rem] orange-glow transition-custom flex flex-col">
                                <h3 className="text-3xl font-black mb-8 italic uppercase">Minimum</h3>
                                <div className="space-y-4 mb-10 flex-grow text-white/50">
                                    <div className="flex gap-2"><Icon name="check" className="text-[#E67E22]" /> Аналитика и стратегия</div>
                                    <div className="flex gap-2"><Icon name="check" className="text-[#E67E22]" /> Сопровождение</div>
                                    <div className="flex gap-2"><Icon name="check" className="text-[#E67E22]" /> Консультации</div>
                                </div>
                                <div className="text-4xl font-black text-[#E67E22]">49 990 ?</div>
                            </div>
                            {/* Standart */}
                            <div className="glass p-10 rounded-[3rem] border-[#E67E22]/50 bg-[#E67E22]/5 orange-glow transition-custom flex flex-col scale-105 relative">
                                <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-[#E67E22] text-xs font-black px-4 py-1 rounded-full uppercase tracking-widest">Хит продаж</div>
                                <h3 className="text-3xl font-black mb-8 italic uppercase">Standart</h3>
                                <div className="space-y-4 mb-10 flex-grow">
                                    <div className="flex gap-2"><Icon name="check" className="text-[#E67E22]" /> 4 видео + 10 Shorts</div>
                                    <div className="flex gap-2"><Icon name="check" className="text-[#E67E22]" /> Сценарии + Монтаж</div>
                                    <div className="flex gap-2"><Icon name="check" className="text-[#E67E22]" /> SEO Оптимизация</div>
                                </div>
                                <div className="text-4xl font-black text-[#E67E22]">59 990 ?</div>
                            </div>
                            {/* Premium */}
                            <div className="glass p-10 rounded-[3rem] orange-glow transition-custom flex flex-col">
                                <h3 className="text-3xl font-black mb-8 italic uppercase">Premium</h3>
                                <div className="space-y-4 mb-10 flex-grow text-white/50">
                                    <div className="flex gap-2"><Icon name="check" className="text-[#E67E22]" /> Все из Standart</div>
                                    <div className="flex gap-2"><Icon name="check" className="text-[#E67E22]" /> Съемка (любой город)</div>
                                    <div className="flex gap-2"><Icon name="check" className="text-[#E67E22]" /> Рекламный отдел</div>
                                </div>
                                <div className="text-4xl font-black text-[#E67E22]">98 990 ?</div>
                            </div>
                        </div>
                    </section>

                    {/* Подвал */}
                    <footer className="py-32 text-center">
                        <h2 className="text-5xl font-black mb-12 uppercase italic tracking-tighter leading-none">Масштабируемся?</h2>
                        <a href="https://t.me/polyasmedia" target="_blank" className="bg-[#E67E22] text-white px-16 py-8 rounded-[2rem] font-black text-3xl hover:scale-110 shadow-[0_0_60px_rgba(230,126,34,0.5)] transition-custom inline-block italic uppercase tracking-tighter">
                            Написать в Telegram
                        </a>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
