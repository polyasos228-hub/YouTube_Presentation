<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyas Media | YouTube Production</title>
    <!-- Подключаем библиотеки -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Анимированные световые волны (Quiet Luxury) */
        .ambient-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #000;
            overflow: hidden;
        }
        .wave {
            position: absolute;
            width: 160vw;
            height: 160vw;
            top: -80vw;
            left: -30vw;
            background: radial-gradient(circle at center, rgba(230, 126, 34, 0.03) 0%, rgba(60, 60, 255, 0.01) 40%, transparent 70%);
            filter: blur(120px);
            animation: moveWave 40s infinite ease-in-out;
            pointer-events: none;
        }
        .wave-bottom {
            bottom: -80vw;
            right: -30vw;
            top: auto;
            left: auto;
            background: radial-gradient(circle at center, rgba(230, 126, 34, 0.025) 0%, transparent 60%);
            animation-duration: 30s;
            animation-direction: reverse;
        }
        @keyframes moveWave {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(10%, 5%) rotate(4deg) scale(1.08); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        
        .luxury-hover {
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .luxury-hover:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-8px);
        }

        .text-hero {
            letter-spacing: -0.05em;
            line-height: 0.95;
            font-weight: 900;
        }

        /* Контурный текст для подложки Scale */
        .outline-text {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.06);
            color: transparent;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        input:focus { border-color: rgba(230, 126, 34, 0.3) !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Счетчик чисел ---
        const AnimatedCounter = ({ end, duration = 2000, suffix = "", prefix = "" }) => {
            const [count, setCount] = useState(0);
            const [isStarted, setIsStarted] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const obs = new IntersectionObserver(([e]) => e.isIntersecting && setIsStarted(true), { threshold: 0.1 });
                if (ref.current) obs.observe(ref.current);
                return () => obs.disconnect();
            }, []);

            useEffect(() => {
                if (!isStarted) return;
                let start = 0;
                const endVal = typeof end === 'string' ? parseInt(end.replace(/\D/g,'')) : end;
                const step = (timestamp) => {
                    if (!start) start = timestamp;
                    const progress = Math.min((timestamp - start) / duration, 1);
                    const easeOutExpo = (t) => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
                    setCount(Math.floor(easeOutExpo(progress) * endVal));
                    if (progress < 1) requestAnimationFrame(step);
                };
                requestAnimationFrame(step);
            }, [isStarted, end]);

            return <span ref={ref}>{prefix}{count.toLocaleString('ru-RU')}{suffix}</span>;
        };

        // --- Плавное появление (Reveal) ---
        const Reveal = ({ children, delay = 0, className = "" }) => {
            const [isVis, setVis] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const obs = new IntersectionObserver(([e]) => e.isIntersecting && setVis(true), { threshold: 0.05 });
                if (ref.current) obs.observe(ref.current);
                return () => obs.disconnect();
            }, []);
            return (
                <div ref={ref} className={`transition-all duration-[1600ms] cubic-bezier(0.16, 1, 0.3, 1) ${className} ${isVis ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );
        };

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const paths = {
                users: "M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
                shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
                trend: "M23 6l-9.5 9.5-5-5L1 18M17 6h6v6",
                check: "M20 6L9 17l-5-5",
                maximize: "M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7",
                sparkles: "M12 3l1.9 5.8a2 2 0 001.2 1.2L21 12l-5.8 1.9a2 2 0 00-1.2 1.2L12 21l-1.9-5.8a2 2 0 00-1.2-1.2L3 12l5.8-1.9a2 2 0 001.2-1.2L12 3z",
                loader: "M21 12a9 9 0 1 1-6.219-8.56"
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] ? <path d={paths[name]} /> : null}
                </svg>
            );
        };

        // --- Нейро-продюсер (GEMINI 1.5 FLASH) ---
        const AIGenerator = () => {
            const [niche, setNiche] = useState('');
            const [result, setResult] = useState('');
            const [loading, setLoading] = useState(false);
            const apiKey = "AIzaSyBSA2UYZ4ZBaMv8hx4-EeF_Dnkjls4fj-Y"; 

            const generate = async () => {
                if (!niche) return;
                setLoading(true);
                setResult('');
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Моя ниша: ${niche}. Придумай 3 кликабельные темы для YouTube.` }] }],
                            systemInstruction: { parts: [{ text: "Ты YouTube продюсер. Напиши 3 идеи. Формат: Заголовок, Суть (1 фраза), Хук. Используй <b> и <br>. Стиль: дорогой минимализм. Без КАПСА." }] }
                        })
                    });
                    const data = await res.json();
                    setResult(data.candidates?.[0]?.content?.parts?.[0]?.text || "Попробуйте еще раз.");
                } catch (e) { 
                    setResult("Извините, сейчас большая нагрузка. Попробуйте через минуту."); 
                } finally { setLoading(false); }
            };

            return (
                <div className="glass p-12 md:p-20 rounded-[4rem] w-full max-w-4xl mx-auto luxury-hover">
                    <h3 className="text-3xl font-bold tracking-tight mb-4 flex items-center gap-3 italic text-white/90">
                        <span className="text-[#E67E22]">✨</span> Нейро-продюсер
                    </h3>
                    <p className="text-white/40 mb-12 text-lg font-light leading-relaxed">Введите вашу нишу, чтобы получить три стратегии захвата внимания.</p>
                    <div className="flex flex-col sm:flex-row gap-5 mb-10">
                        <input value={niche} onChange={e => setNiche(e.target.value)} placeholder="Напр: Инвестиции в ОАЭ..." className="flex-grow bg-white/[0.03] border border-white/5 rounded-[1.5rem] px-8 py-5 outline-none transition-all text-lg font-light text-white" />
                        <button onClick={generate} disabled={loading} className="bg-white text-black px-12 py-5 rounded-[1.5rem] font-black text-lg hover:bg-[#E67E22] hover:text-white transition-all active:scale-95 disabled:opacity-50">
                            {loading ? "Думаю..." : "Получить идеи"}
                        </button>
                    </div>
                    {result && <div className="bg-black/30 rounded-[2.5rem] p-10 border border-white/5 text-white/70 leading-relaxed text-lg font-light animate-in fade-in slide-in-from-bottom-6 duration-1000" dangerouslySetInnerHTML={{ __html: result }} />}
                </div>
            );
        };

        const App = () => {
            const [selectedImg, setSelectedImg] = useState(null);

            return (
                <div className="w-full">
                    <div className="ambient-canvas">
                        <div className="wave"></div>
                        <div className="wave wave-bottom"></div>
                    </div>
                    
                    {/* 1. Hero */}
                    <section className="min-h-screen flex flex-col items-center justify-center text-center px-6 relative">
                        <Reveal>
                            <div className="glass px-6 py-2 rounded-full mb-12 inline-block border-white/10">
                                <span className="text-[10px] font-bold uppercase tracking-[0.6em] text-white/40 italic">Polyas Media Group</span>
                            </div>
                        </Reveal>
                        <Reveal delay={200}>
                            <h1 className="text-hero text-6xl md:text-[112px] mb-12">
                                Создаю YouTube,<br/>приносящий <span className="text-[#E67E22]">заявки</span>
                            </h1>
                        </Reveal>
                        <Reveal delay={400}>
                            <p className="text-xl md:text-2xl text-white/30 max-w-4xl mx-auto mb-20 font-light leading-snug">
                                Только целевой трафик и системный контент-маркетинг <br/>для экспертов и лидеров рынка.
                            </p>
                        </Reveal>
                        <Reveal delay={600}>
                            <a href="https://t.me/polyasmedia" target="_blank" className="bg-white text-black px-16 py-7 rounded-full font-black text-xl hover:bg-[#E67E22] hover:text-white transition-all duration-700 shadow-2xl active:scale-95">
                                Обсудить проект
                            </a>
                        </Reveal>
                    </section>

                    {/* 2. Статистика */}
                    <section className="py-32 px-6 max-w-7xl mx-auto">
                        <div className="grid md:grid-cols-3 gap-12">
                            {[
                                { val: 22, suff: " млн чел", desc: "Ежедневная аудитория в РФ." },
                                { val: 100, suff: "% доверия", desc: "Прогрев до первого звонка." },
                                { val: 24, suff: "/7 работа", desc: "Ваш вечный медиа-актив." }
                            ].map((item, i) => (
                                <Reveal key={i} delay={i * 200}>
                                    <div className="glass p-16 rounded-[5rem] luxury-hover text-center h-full">
                                        <h3 className="text-5xl font-black mb-6 tracking-tighter">
                                            <AnimatedCounter end={item.val} suffix={item.suff} />
                                        </h3>
                                        <p className="text-white/20 text-xl font-light italic">{item.desc}</p>
                                    </div>
                                </Reveal>
                            ))}
                        </div>
                    </section>

                    {/* 3. Воронка */}
                    <section className="py-40 px-6 bg-white/[0.01]">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-32 items-center">
                            <div className="space-y-16">
                                <Reveal><h2 className="text-6xl md:text-8xl font-black tracking-tighter italic leading-none">От стратегии<br/>до прибыли</h2></Reveal>
                                {["Глубокая аналитика ЦА", "Сценарный отдел (Хуки)", "Production под ключ"].map((step, i) => (
                                    <Reveal key={i} delay={i * 200}>
                                        <div className="flex gap-10 items-center p-10 rounded-[3rem] glass luxury-hover border-white/5">
                                            <div className="text-4xl font-black italic text-[#E67E22] opacity-30">0{i+1}</div>
                                            <div className="text-2xl font-semibold tracking-tight text-white/80">{step}</div>
                                        </div>
                                    </Reveal>
                                ))}
                            </div>
                            <Reveal delay={400}>
                                <div className="glass p-20 rounded-[6rem] text-center border-white/5 shadow-2xl">
                                    <p className="text-[10px] font-bold uppercase tracking-[0.5em] text-[#E67E22] mb-12 opacity-60">ROI Прогноз</p>
                                    <div className="text-[140px] font-black tracking-tighter leading-none mb-6">1000</div>
                                    <p className="text-4xl font-bold tracking-tight italic opacity-90 uppercase">просмотров ≈ 10 заявок</p>
                                    <p className="text-white/20 text-lg mt-10 font-light italic">Результат системной работы <br/>на горизонте 3-4 месяцев.</p>
                                </div>
                            </Reveal>
                        </div>
                    </section>

                    {/* 4. Кейсы */}
                    <section className="py-32 px-6 max-w-7xl mx-auto">
                        <Reveal><h2 className="text-7xl md:text-[130px] font-black tracking-tighter italic mb-32 opacity-10 uppercase text-center select-none">Portfolio</h2></Reveal>
                        <div className="grid md:grid-cols-2 gap-20">
                            {[
                                { name: "Get ASIC", niche: "Майнинг", img: "photo_1_2026-04-20_22-09-41.jpg", val: 2000, suffix: " лидов / мес" },
                                { name: "SER CRYPTO", niche: "Инвестиции", img: "photo_3_2026-04-20_22-09-41.jpg", val: 1000, suffix: "+ заявок / мес" },
                                { name: "NTS AUTO", niche: "Оптовые продажи", img: "photo_2_2026-04-20_22-09-41.jpg", val: 5, prefix: "Рост в ", suffix: " раз" },
                                { name: "Lavanta Ride", niche: "Бизнес в Турции", img: "photo_4_2026-04-20_22-09-41.jpg", val: 200, suffix: " скутеров / мес" }
                            ].map((k, i) => (
                                <Reveal key={i} delay={i * 200}>
                                    <div 
                                        className="group relative glass rounded-[4.5rem] overflow-hidden luxury-hover cursor-pointer"
                                        onClick={() => setSelectedImg(k.img)}
                                    >
                                        <div className="h-[600px] overflow-hidden relative">
                                            <img src={k.img} className="w-full h-full object-cover object-top opacity-70 transition-all duration-[3s] group-hover:scale-105 group-hover:opacity-80" alt={k.name} />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                                            <div className="absolute bottom-16 left-16 right-16">
                                                <h3 className="text-5xl font-black tracking-tight mb-4 italic uppercase">{k.name}</h3>
                                                <p className="text-[#E67E22] font-black text-xs uppercase tracking-[0.4em] mb-12">{k.niche}</p>
                                                <div className="text-4xl font-bold tracking-tighter text-white/90 glass py-5 px-10 rounded-full inline-block">
                                                    <AnimatedCounter end={k.val} prefix={k.prefix} suffix={k.suffix} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </Reveal>
                            ))}
                        </div>
                    </section>

                    {/* 5. AI Интерактив */}
                    <section className="py-40 px-6">
                        <Reveal className="text-center mb-20">
                            <h2 className="text-5xl md:text-[90px] font-black tracking-tighter italic">Идеи для вас</h2>
                        </Reveal>
                        <Reveal delay={200}><AIGenerator /></Reveal>
                    </section>

                    {/* 6. Прайсы */}
                    <section className="py-32 px-6 max-w-7xl mx-auto">
                        <div className="grid lg:grid-cols-3 gap-12">
                            {[
                                { title: "Minimum", price: 49990, items: ["Аналитика (соц. сети)", "Онлайн сопровождение", "Консультации по медиа"] },
                                { title: "Standart", price: 59990, items: ["4 видео + 10 Shorts / мес", "Сценарии + Монтаж + Дизайн", "SEO + Упаковка канала"], popular: true },
                                { title: "Premium", price: 98990, items: ["Все возможности Standart", "Съемка в любом городе", "Работа с продюсером"] }
                            ].map((p, i) => (
                                <Reveal key={i} delay={i * 200} className="h-full">
                                    <div className={`flex flex-col glass rounded-[5rem] p-16 h-full luxury-hover relative ${p.popular ? 'scale-105 border-[#E67E22]/30 shadow-2xl' : 'border-white/5'}`}>
                                        {p.popular && <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-[#E67E22] text-black font-black px-8 py-2 rounded-full uppercase text-[10px] tracking-widest shadow-xl">Best Choice</div>}
                                        <h3 className="text-4xl font-bold mb-16 tracking-tight italic uppercase">{p.title}</h3>
                                        <ul className="space-y-10 mb-24 flex-grow">
                                            {p.items.map((item, idx) => (
                                                <li key={idx} className="flex gap-6 items-start text-xl text-white/30 font-light leading-tight">
                                                    <span className="text-[#E67E22] font-black italic">✓</span>
                                                    <span>{item}</span>
                                                </li>
                                            ))}
                                        </ul>
                                        <div className="pt-12 border-t border-white/5">
                                            <div className="text-6xl font-black tracking-tighter text-white mb-3"><AnimatedCounter end={p.price} suffix=" ₽" /></div>
                                            <p className="text-[11px] text-white/20 uppercase font-bold tracking-[0.2em] italic">Скидка 20% от 3 мес.</p>
                                        </div>
                                    </div>
                                </Reveal>
                            ))}
                        </div>
                    </section>

                    {/* Финальный слайд: Scale */}
                    <footer className="py-80 text-center relative overflow-hidden">
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-100">
                            <span className="outline-text text-[240px] md:text-[500px]">Scale</span>
                        </div>
                        
                        <Reveal>
                            <div className="relative z-10">
                                <h3 className="text-7xl md:text-[140px] font-black tracking-tighter mb-20 leading-none text-white italic drop-shadow-2xl">Пора расти</h3>
                                <a href="https://t.me/polyasmedia" target="_blank" className="inline-block px-24 py-12 bg-white text-black rounded-full font-black text-3xl uppercase italic tracking-tighter shadow-[0_0_100px_rgba(255,255,255,0.25)] hover:bg-[#E67E22] hover:text-white transition-all duration-700 active:scale-95">
                                    Написать в Telegram
                                </a>
                            </div>
                        </Reveal>
                    </footer>

                    {/* Модальное окно */}
                    {selectedImg && (
                        <div className="fixed inset-0 z-[100] bg-black/98 flex items-center justify-center p-6 md:p-20 cursor-zoom-out animate-in fade-in duration-500" onClick={() => setSelectedImg(null)}>
                            <div className="absolute top-12 right-12 text-white/30 hover:text-white transition-colors cursor-pointer text-xs font-bold uppercase tracking-widest flex items-center gap-4">
                                Закрыть <Icon name="maximize" className="rotate-45" />
                            </div>
                            <img src={selectedImg} className="max-w-full max-h-full rounded-[4rem] shadow-2xl object-contain animate-in zoom-in-95 duration-700" />
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
