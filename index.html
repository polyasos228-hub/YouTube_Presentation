<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyas Media | YouTube Production</title>
    <!-- Библиотеки -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Имитация SF UI Display */
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #050505; 
            color: white; 
            margin: 0; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        .luxury-glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .luxury-card {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .luxury-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(230, 126, 34, 0.3);
            transform: translateY(-8px);
        }
        .text-header {
            letter-spacing: -0.05em;
            line-height: 0.9;
        }
        ::selection {
            background: #E67E22;
            color: white;
        }
        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Компонент Иконок
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const paths = {
                check: "M20 6L9 17l-5-5",
                arrow: "M5 12h14M12 5l7 7-7 7",
                plus: "M12 5v14M5 12h14",
                zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
                maximize: "M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name] || ""} />
                </svg>
            );
        };

        const App = () => {
            const [selectedImg, setSelectedImg] = useState(null);

            return (
                <div className="w-full selection:bg-orange-500">
                    
                    {/* Слайд 1: Главный экран */}
                    <section className="min-h-screen flex flex-col items-center justify-center text-center px-6 relative">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(230,126,34,0.03)_0%,transparent_70%)] pointer-events-none"></div>
                        <div className="inline-flex items-center gap-2 px-5 py-2 rounded-full border border-white/5 bg-white/[0.02] mb-12 overflow-hidden">
                            <span className="w-1.5 h-1.5 rounded-full bg-[#E67E22] animate-pulse"></span>
                            <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-white/40">SYSTEM YOUTUBE PRODUCTION</span>
                        </div>
                        <h1 className="text-header text-6xl md:text-[120px] font-black uppercase mb-8">
                            Создаю <span className="text-[#E67E22]">трафик</span><br/>через контент
                        </h1>
                        <p className="text-lg md:text-xl text-white/30 max-w-2xl mb-16 font-medium leading-relaxed uppercase tracking-tight">
                            Индивидуальные стратегии продвижения для бизнеса, <br/>который ценит качество и результат.
                        </p>
                        <a href="https://t.me/polyasmedia" target="_blank" className="group flex items-center gap-4 bg-white text-black px-10 py-5 rounded-full font-black text-sm uppercase tracking-widest hover:bg-[#E67E22] hover:text-white transition-all duration-500">
                            Обсудить проект <Icon name="arrow" className="w-4 h-4 group-hover:translate-x-1 transition-transform" />
                        </a>
                    </section>

                    {/* Слайд 2: Твердые результаты (Кейсы) */}
                    <section className="py-32 px-6 max-w-7xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-20 gap-8">
                            <div>
                                <p className="text-[#E67E22] font-bold text-xs uppercase tracking-[0.4em] mb-4">Portfolio</p>
                                <h2 className="text-header text-5xl md:text-7xl font-black uppercase italic">Твердые результаты</h2>
                            </div>
                            <p className="text-white/20 text-sm max-w-xs uppercase font-bold tracking-tighter">
                                Более 70 успешно запущенных каналов и 320+ уникальных видео-проектов.
                            </p>
                        </div>
                        
                        <div className="grid md:grid-cols-2 gap-12">
                            {[
                                { name: "Get ASIC", niche: "Майнинг оборудование", img: "photo_1_2026-04-20_22-09-41.jpg", res: "2000 лидов / мес" },
                                { name: "SER CRYPTO", niche: "Инвестиции", img: "photo_3_2026-04-20_22-09-41.jpg", res: "1000+ заявок / мес" },
                                { name: "NTS AUTO", niche: "Оптовые поставки", img: "photo_2_2026-04-20_22-09-41.jpg", res: "Рост продаж x5" },
                                { name: "Lavanta Ride", niche: "Бизнес в Турции", img: "photo_4_2026-04-20_22-09-41.jpg", res: "200 скутеров / мес" }
                            ].map((k, i) => (
                                <div key={i} className="luxury-card group rounded-[2.5rem] overflow-hidden border border-white/5 bg-white/[0.01] cursor-pointer" onClick={() => setSelectedImg(k.img)}>
                                    <div className="h-[400px] relative overflow-hidden bg-[#0a0a0a]">
                                        <img src={k.img} className="w-full h-full object-cover object-top opacity-60 group-hover:scale-105 group-hover:opacity-100 transition-all duration-1000" alt={k.name} />
                                        <div className="absolute top-8 right-8 w-12 h-12 rounded-full luxury-glass flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <Icon name="maximize" className="w-4 h-4 text-white" />
                                        </div>
                                        <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-transparent"></div>
                                    </div>
                                    <div className="p-10 -mt-20 relative z-10">
                                        <h3 className="text-header text-4xl font-black uppercase mb-2">{k.name}</h3>
                                        <p className="text-[#E67E22] font-black text-[10px] uppercase tracking-[0.3em] mb-6">{k.niche}</p>
                                        <div className="flex items-center gap-3">
                                            <div className="h-[1px] w-8 bg-white/20"></div>
                                            <span className="text-2xl font-black italic tracking-tighter text-white/90">{k.res}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Слайд 3: Прайсы */}
                    <section className="py-32 px-6 max-w-7xl mx-auto">
                        <div className="text-center mb-24">
                            <h2 className="text-header text-6xl md:text-[100px] font-black uppercase tracking-tighter">Прайсы</h2>
                            <p className="text-white/20 font-bold uppercase tracking-[0.2em] mt-4 text-sm italic">Выбирайте свой уровень влияния</p>
                        </div>

                        <div className="grid lg:grid-cols-3 gap-8 items-stretch">
                            {/* Minimum */}
                            <div className="luxury-card p-12 rounded-[3rem] border border-white/5 bg-white/[0.02] flex flex-col">
                                <h3 className="text-header text-3xl font-black uppercase mb-10 italic">Minimum</h3>
                                <ul className="space-y-6 mb-16 flex-grow">
                                    {[
                                        "Аналитика и стратегия (соц. сети)",
                                        "Онлайн сопровождение",
                                        "Консультации по всем вопросам"
                                    ].map((t, i) => (
                                        <li key={i} className="flex gap-4 items-start text-white/40 text-sm font-medium leading-relaxed uppercase tracking-tighter">
                                            <Icon name="check" className="text-[#E67E22] w-4 h-4 shrink-0 mt-0.5" />
                                            <span>{t}</span>
                                        </li>
                                    ))}
                                </ul>
                                <div className="pt-8 border-t border-white/5">
                                    <div className="text-4xl font-black tracking-tighter italic uppercase text-white/90">49 990 ₽</div>
                                </div>
                            </div>

                            {/* Standart */}
                            <div className="luxury-card p-12 rounded-[3rem] border border-[#E67E22]/30 bg-white/[0.03] flex flex-col relative scale-105 shadow-2xl">
                                <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-[#E67E22] text-white text-[9px] font-black px-5 py-1.5 rounded-full uppercase tracking-[0.2em]">MOST POPULAR</div>
                                <h3 className="text-header text-3xl font-black uppercase mb-10 italic">Standart</h3>
                                <ul className="space-y-6 mb-16 flex-grow">
                                    {[
                                        "4 видео + 10 Shorts в месяц",
                                        "Сценарии + Монтаж + Дизайн",
                                        "SEO Оптимизация и упаковка",
                                        "Полное ведение канала"
                                    ].map((t, i) => (
                                        <li key={i} className="flex gap-4 items-start text-white/90 text-sm font-bold leading-relaxed uppercase tracking-tighter">
                                            <Icon name="check" className="text-[#E67E22] w-4 h-4 shrink-0 mt-0.5" />
                                            <span>{t}</span>
                                        </li>
                                    ))}
                                </ul>
                                <div className="pt-8 border-t border-white/10">
                                    <div className="text-5xl font-black tracking-tighter italic uppercase text-[#E67E22]">59 990 ₽</div>
                                    <p className="text-[10px] text-white/20 mt-3 font-bold uppercase tracking-widest">скидка 20% от 3 месяцев</p>
                                </div>
                            </div>

                            {/* Premium */}
                            <div className="luxury-card p-12 rounded-[3rem] border border-white/5 bg-white/[0.02] flex flex-col">
                                <h3 className="text-header text-3xl font-black uppercase mb-10 italic">Premium</h3>
                                <ul className="space-y-6 mb-16 flex-grow">
                                    {[
                                        "Все возможности Standart",
                                        "Съемка в студии (любой город)",
                                        "Участие продюсера",
                                        "Рекламный отдел и таргет"
                                    ].map((t, i) => (
                                        <li key={i} className="flex gap-4 items-start text-white/40 text-sm font-medium leading-relaxed uppercase tracking-tighter">
                                            <Icon name="check" className="text-[#E67E22] w-4 h-4 shrink-0 mt-0.5" />
                                            <span>{t}</span>
                                        </li>
                                    ))}
                                </ul>
                                <div className="pt-8 border-t border-white/5">
                                    <div className="text-4xl font-black tracking-tighter italic uppercase text-white/90">98 990 ₽</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Модалка для картинок */}
                    {selectedImg && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6 cursor-zoom-out" onClick={() => setSelectedImg(null)}>
                            <div className="absolute top-10 right-10 text-white/40 hover:text-white transition-colors cursor-pointer">
                                <div className="text-xs font-black uppercase tracking-widest flex items-center gap-2">Закрыть <Icon name="plus" className="rotate-45" /></div>
                            </div>
                            <img src={selectedImg} className="max-w-full max-h-full rounded-2xl shadow-2xl object-contain animate-in zoom-in-95 duration-300" />
                        </div>
                    )}

                    {/* Подвал */}
                    <footer className="py-40 text-center relative">
                        <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-gradient-to-t from-[#E67E22]/10 to-transparent pointer-events-none"></div>
                        <h2 className="text-header text-6xl md:text-[120px] font-black uppercase tracking-tighter italic leading-none mb-16">
                            Начнем <br/><span className="text-[#E67E22]">сейчас?</span>
                        </h2>
                        <a href="https://t.me/polyasmedia" target="_blank" className="inline-block px-16 py-8 bg-[#E67E22] text-white rounded-full font-black text-2xl uppercase italic tracking-tighter hover:scale-110 active:scale-95 shadow-[0_0_80px_rgba(230,126,34,0.4)] transition-all duration-500">
                            Написать в Telegram
                        </a>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
