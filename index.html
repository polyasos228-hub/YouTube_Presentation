<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyas Media | YouTube Production</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #000;
        }
        .blob {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(230, 126, 34, 0.05) 0%, rgba(230, 126, 34, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 20s infinite alternate ease-in-out;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .luxury-card {
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .luxury-card:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-4px);
        }

        .text-header {
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="ambient-glow">
        <div class="blob" style="top: -10%; left: -10%;"></div>
        <div class="blob" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(100, 100, 255, 0.02) 0%, transparent 70%);"></div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Счетчик чисел ---
        const CountUp = ({ end, duration = 2000, suffix = "", prefix = "" }) => {
            const [count, setCount] = useState(0);
            const [isStarted, setIsStarted] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const obs = new IntersectionObserver(([e]) => e.isIntersecting && setIsStarted(true), { threshold: 0.1 });
                if (ref.current) obs.observe(ref.current);
                return () => obs.disconnect();
            }, []);

            useEffect(() => {
                if (!isStarted) return;
                let start = 0;
                const endValue = parseInt(end.toString().replace(/\s/g, ''));
                const increment = endValue / (duration / 16);
                
                const timer = setInterval(() => {
                    start += increment;
                    if (start >= endValue) {
                        setCount(endValue);
                        clearInterval(timer);
                    } else {
                        setCount(Math.floor(start));
                    }
                }, 16);
                return () => clearInterval(timer);
            }, [isStarted, end]);

            return <span ref={ref}>{prefix}{count.toLocaleString('ru-RU')}{suffix}</span>;
        };

        // --- Плавное появление ---
        const Reveal = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const obs = new IntersectionObserver(([e]) => e.isIntersecting && setIsVisible(true), { threshold: 0.05 });
                if (ref.current) obs.observe(ref.current);
                return () => obs.disconnect();
            }, []);
            return (
                <div ref={ref} className={`transition-all duration-[1200ms] cubic-bezier(0.23, 1, 0.32, 1) ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );
        };

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const paths = {
                users: "M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
                shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
                trend: "M23 6l-9.5 9.5-5-5L1 18M17 6h6v6",
                check: "M20 6L9 17l-5-5",
                maximize: "M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7",
                sparkles: "M12 3l1.9 5.8a2 2 0 001.2 1.2L21 12l-5.8 1.9a2 2 0 00-1.2 1.2L12 21l-1.9-5.8a2 2 0 00-1.2-1.2L3 12l5.8-1.9a2 2 0 001.2-1.2L12 3z",
                loader: "M21 12a9 9 0 1 1-6.219-8.56"
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name] || ""} />
                </svg>
            );
        };

        const AIGenerator = () => {
            const [niche, setNiche] = useState('');
            const [result, setResult] = useState('');
            const [loading, setLoading] = useState(false);
            const apiKey = ""; 

            const generate = async () => {
                if (!niche) return;
                setLoading(true);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Моя ниша: ${niche}. Предложи 3 вирусные идеи для YouTube.` }] }],
                            systemInstruction: { parts: [{ text: "Ты YouTube-продюсер. Пиши: 1. Заголовок. 2. Суть. 3. Хук. Используй <b> и <br>. Стиль: премиальный, без КАПСА." }] }
                        })
                    });
                    const data = await res.json();
                    setResult(data.candidates?.[0]?.content?.parts?.[0]?.text || "Попробуйте позже.");
                } catch (e) { setResult("Ошибка подключения."); }
                finally { setLoading(false); }
            };

            return (
                <div className="glass p-10 md:p-14 rounded-[3rem] w-full max-w-4xl mx-auto luxury-card">
                    <div className="flex items-center gap-4 mb-6">
                        <Icon name="sparkles" className="text-[#E67E22] w-7 h-7" />
                        <h3 className="text-2xl font-bold tracking-tight">Нейро-продюсер</h3>
                    </div>
                    <p className="text-white/40 mb-10 text-lg font-light">Введите вашу нишу, чтобы получить 3 стратегии захвата внимания.</p>
                    <div className="flex flex-col sm:flex-row gap-4 mb-8">
                        <input value={niche} onChange={e => setNiche(e.target.value)} placeholder="Например: Недвижимость..." className="flex-grow bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-white/20 transition-all font-light" />
                        <button onClick={generate} disabled={loading} className="bg-white text-black px-10 py-4 rounded-2xl font-bold hover:bg-[#E67E22] hover:text-white transition-all flex items-center justify-center gap-2">
                            {loading && <Icon name="loader" className="animate-spin w-4 h-4" />}
                            {loading ? "Думаю..." : "Сгенерировать"}
                        </button>
                    </div>
                    {result && <div className="bg-black/30 rounded-3xl p-8 border border-white/5 text-white/70 leading-relaxed font-light text-lg" dangerouslySetInnerHTML={{ __html: result }} />}
                </div>
            );
        };

        const App = () => {
            const [selectedImg, setSelectedImg] = useState(null);

            return (
                <div className="w-full">
                    {/* Hero */}
                    <section className="min-h-[90vh] flex flex-col items-center justify-center text-center px-6">
                        <Reveal>
                            <div className="glass px-5 py-2 rounded-full mb-10 inline-block border-white/10">
                                <span className="text-[10px] font-bold uppercase tracking-[0.4em] text-white/40">Polyas Media Group</span>
                            </div>
                        </Reveal>
                        <Reveal delay={200}>
                            <h1 className="text-header text-5xl md:text-[84px] font-extrabold tracking-tight mb-8">
                                Твой YouTube-канал<br/>как <span className="text-[#E67E22]">бизнес-актив</span>
                            </h1>
                        </Reveal>
                        <Reveal delay={400}>
                            <p className="text-lg md:text-xl text-white/30 max-w-2xl mx-auto mb-14 font-light leading-relaxed">
                                Создаем медийный капитал, который работает на вас 24/7. <br/>Системный контент и прогнозируемые продажи.
                            </p>
                        </Reveal>
                        <Reveal delay={600}>
                            <a href="https://t.me/polyasmedia" target="_blank" className="bg-white text-black px-12 py-5 rounded-full font-bold text-lg hover:bg-[#E67E22] hover:text-white transition-all shadow-xl">
                                Обсудить проект
                            </a>
                        </Reveal>
                    </section>

                    {/* Почему YouTube */}
                    <section className="py-24 px-6 max-w-7xl mx-auto">
                        <Reveal>
                            <div className="text-center mb-20">
                                <h2 className="text-4xl md:text-6xl font-bold tracking-tight mb-4">Ваши клиенты уже здесь</h2>
                                <p className="text-white/20 uppercase tracking-[0.2em] text-[10px] font-bold">Почему YouTube — это база</p>
                            </div>
                        </Reveal>
                        <div className="grid md:grid-cols-3 gap-10">
                            {[
                                { icon: "users", title: " млн человек", val: 22, desc: "Ежедневная активная аудитория в РФ. Самый высокий чек на рынке." },
                                { icon: "shield", title: "Тёплый трафик", val: 100, suffix: "% доверия", desc: "Видео снимает возражения еще до первого контакта с менеджером." },
                                { icon: "trend", title: "Долговечный актив", val: 24, suffix: "/7 работа", desc: "Видео в поиске живет годами, принося лиды без вложений в таргет." }
                            ].map((item, i) => (
                                <Reveal key={i} delay={i * 100}>
                                    <div className="glass p-10 rounded-[3rem] luxury-card flex flex-col items-center text-center h-full">
                                        <Icon name={item.icon} className="text-[#E67E22] w-10 h-10 mb-8" />
                                        <h3 className="text-3xl font-bold mb-4 tracking-tight">
                                            <CountUp end={item.val} suffix={item.suffix || item.title} />
                                        </h3>
                                        <p className="text-white/30 text-base leading-relaxed font-light">{item.desc}</p>
                                    </div>
                                </Reveal>
                            ))}
                        </div>
                    </section>

                    {/* Система работы */}
                    <section className="py-24 px-6 bg-white/[0.01]">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-20 items-center">
                            <div className="space-y-8">
                                <Reveal>
                                    <h2 className="text-4xl md:text-6xl font-bold tracking-tight mb-8 italic leading-tight">От стратегии<br/>до прибыли</h2>
                                    <p className="text-xl text-white/20 mb-10 font-light">Мы строим маркетинговую воронку внутри вашего канала.</p>
                                </Reveal>
                                {[
                                    {t: "Аналитика", d: "Изучаем боли аудитории и пробелы конкурентов."},
                                    {t: "Сценарии", d: "Каждое видео удерживает внимание до конца."},
                                    {t: "Production", d: "Монтаж, дизайн и SEO-оптимизация под ключ."}
                                ].map((item, i) => (
                                    <Reveal key={i} delay={i * 150}>
                                        <div className="flex gap-6 items-start p-6 rounded-[2rem] glass luxury-card">
                                            <div className="w-10 h-10 rounded-xl bg-[#E67E22]/10 text-[#E67E22] flex items-center justify-center font-bold">{i+1}</div>
                                            <div>
                                                <h4 className="text-xl font-bold mb-1 tracking-tight">{item.t}</h4>
                                                <p className="text-white/30 text-sm font-light leading-relaxed">{item.d}</p>
                                            </div>
                                        </div>
                                    </Reveal>
                                ))}
                            </div>
                            <Reveal delay={300}>
                                <div className="glass p-12 rounded-[4rem] relative overflow-hidden text-center shadow-2xl">
                                    <p className="text-[9px] font-bold uppercase tracking-[0.4em] text-[#E67E22] mb-10">Прогноз окупаемости</p>
                                    <div className="text-8xl md:text-9xl font-black tracking-tighter leading-none mb-4">
                                        <CountUp end={1000} />
                                    </div>
                                    <p className="text-2xl font-bold tracking-tight mb-6 opacity-80 uppercase italic">просмотров ≈ 10 заявок</p>
                                    <p className="text-white/20 text-sm italic font-light">Результат системной работы через 3-4 месяца.</p>
                                </div>
                            </Reveal>
                        </div>
                    </section>

                    {/* Кейсы */}
                    <section className="py-24 px-6 max-w-7xl mx-auto">
                        <Reveal>
                            <div className="mb-16 flex flex-col md:flex-row justify-between items-end gap-6">
                                <h2 className="text-5xl md:text-7xl font-bold tracking-tighter italic">Кейсы</h2>
                                <p className="text-white/20 max-w-xs text-sm font-light italic">Реальные цифры наших клиентов в разных нишах.</p>
                            </div>
                        </Reveal>
                        <div className="grid md:grid-cols-2 gap-12">
                            {[
                                { name: "Get ASIC", niche: "Майнинг", img: "photo_1_2026-04-20_22-09-41.jpg", res: "2000 лидов в месяц", val: 2000 },
                                { name: "SER CRYPTO", niche: "Инвестиции", img: "photo_3_2026-04-20_22-09-41.jpg", res: "1000+ заявок в месяц", val: 1000 },
                                { name: "NTS AUTO", niche: "Опт из Китая", img: "photo_2_2026-04-20_22-09-41.jpg", res: "Рост продаж в 5 раз", val: 5 },
                                { name: "Lavanta Ride", niche: "Турция", img: "photo_4_2026-04-20_22-09-41.jpg", res: "200 скутеров в месяц", val: 200 }
                            ].map((k, i) => (
                                <Reveal key={i} delay={i * 100}>
                                    <div className="glass rounded-[3rem] overflow-hidden luxury-card cursor-pointer group" onClick={() => setSelectedImg(k.img)}>
                                        <div className="h-72 overflow-hidden relative">
                                            <img src={k.img} className="w-full h-full object-cover object-top opacity-50 group-hover:scale-105 transition-all duration-[1.5s]" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                                        </div>
                                        <div className="p-10 -mt-16 relative z-10">
                                            <h3 className="text-3xl font-bold tracking-tight mb-1 uppercase">{k.name}</h3>
                                            <p className="text-[#E67E22] font-bold text-[10px] uppercase tracking-[0.3em] mb-6">{k.niche}</p>
                                            <div className="text-2xl font-bold tracking-tighter text-white/90">
                                                {i === 2 ? <><CountUp end={5} prefix="х" /> рост продаж</> : <CountUp end={k.val} suffix={k.res.replace(k.val.toString(), '')} />}
                                            </div>
                                        </div>
                                    </div>
                                </Reveal>
                            ))}
                        </div>
                    </section>

                    {/* AI */}
                    <section className="py-32 px-6">
                        <Reveal>
                            <div className="text-center mb-10">
                                <h2 className="text-4xl md:text-6xl font-bold tracking-tight italic">Ваши идеи уже здесь</h2>
                            </div>
                        </Reveal>
                        <Reveal delay={200}><AIGenerator /></Reveal>
                    </section>

                    {/* Прайсы */}
                    <section className="py-32 px-6 max-w-7xl mx-auto">
                        <Reveal>
                            <h2 className="text-6xl md:text-[100px] font-black tracking-tighter text-center mb-24 italic opacity-5 uppercase">Прайсы</h2>
                        </Reveal>
                        <div className="grid lg:grid-cols-3 gap-10">
                            {[
                                { title: "Minimum", price: 49990, items: ["Аналитика (соц. сети)", "Онлайн сопровождение", "Консультации по медиа"] },
                                { title: "Standart", price: 59990, items: ["4 видео + 10 Shorts", "Сценарии + Монтаж", "SEO + Упаковка канала"], popular: true },
                                { title: "Premium", price: 98990, items: ["Все из Standart", "Съемка в любом городе", "Работа с продюсером"] }
                            ].map((p, i) => (
                                <Reveal key={i} delay={i * 150}>
                                    <div className={`glass p-10 rounded-[3.5rem] flex flex-col luxury-card relative ${p.popular ? 'scale-105 border-[#E67E22]/30' : ''}`}>
                                        {p.popular && <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-[#E67E22] text-black font-bold px-5 py-1.5 rounded-full uppercase text-[9px] tracking-widest shadow-xl">Best Choice</div>}
                                        <h3 className="text-3xl font-bold mb-10 tracking-tight italic uppercase">{p.title}</h3>
                                        <ul className="space-y-6 mb-16 flex-grow">
                                            {p.items.map((item, idx) => (
                                                <li key={idx} className="flex gap-4 items-start text-base text-white/40 font-light">
                                                    <Icon name="check" className="text-[#E67E22] w-5 h-5 shrink-0" />
                                                    <span>{item}</span>
                                                </li>
                                            ))}
                                        </ul>
                                        <div className="pt-8 border-t border-white/5">
                                            <div className="text-4xl font-black tracking-tighter text-white mb-1">
                                                <CountUp end={p.price} suffix=" ₽" />
                                            </div>
                                            <p className="text-[9px] text-white/20 uppercase font-bold tracking-widest leading-none">скидка 20% / 3 мес.</p>
                                        </div>
                                    </div>
                                </Reveal>
                            ))}
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-48 text-center relative overflow-hidden">
                        <div className="absolute inset-0 bg-[#E67E22]/5 blur-[150px] pointer-events-none"></div>
                        <Reveal>
                            <h2 className="text-6xl md:text-[100px] font-extrabold tracking-tighter italic leading-none mb-14">Пора расти</h2>
                            <a href="https://t.me/polyasmedia" target="_blank" className="inline-block px-16 py-8 bg-[#E67E22] text-white rounded-full font-bold text-2xl uppercase italic tracking-tighter shadow-2xl hover:scale-105 transition-all">
                                Написать в Telegram
                            </a>
                        </Reveal>
                    </footer>

                    {/* Modal */}
                    {selectedImg && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6 cursor-zoom-out animate-in fade-in duration-300" onClick={() => setSelectedImg(null)}>
                            <img src={selectedImg} className="max-w-full max-h-full rounded-2xl shadow-2xl object-contain animate-in zoom-in-95 duration-500" />
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
